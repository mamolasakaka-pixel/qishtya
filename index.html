<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qishtya Menu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            text-align: center;
        }

        header {
            padding: 40px 20px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #111;
        }

        .menu-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .menu-item {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .menu-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        footer {
            margin: 60px 0 20px 0;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Qishtya</h1>
    </header>

    <div class="menu-container">
        <div class="menu-item"><img src="menu1.png" alt="Menu 1"></div>
        <div class="menu-item"><img src="menu2.png" alt="Menu 2"></div>
        <div class="menu-item"><img src="menu3.png" alt="Menu 3"></div>
        <div class="menu-item"><img src="menu4.png" alt="Menu 4"></div>
        <div class="menu-item"><img src="menu5.png" alt="Menu 5"></div>
        <div class="menu-item"><img src="menu6.png" alt="Menu 6"></div>
        <div class="menu-item"><img src="menu7.png" alt="Menu 7"></div>
        <div class="menu-item"><img src="menu8.png" alt="Menu 8"></div>
        <div class="menu-item"><img src="menu9.png" alt="Menu 9"></div>
        <div class="menu-item"><img src="menu10.png" alt="Menu 10"></div>
        <div class="menu-item"><img src="menu11.png" alt="Menu 11"></div>
        <div class="menu-item"><img src="menu12.png" alt="Menu 12"></div>
        <div class="menu-item"><img src="menu13.png" alt="Menu 13"></div>
        <div class="menu-item"><img src="menu14.png" alt="Menu 14"></div>
    </div>

    <footer>
        <p>&copy; 2026 Qishtya. All Rights Reserved.</p>
    </footer>

</body>
</html>
